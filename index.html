<!DOCTYPE html>

<title>365Resellz Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
}

header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 48px;
    color: #111;
}

header img {
    width: 40px;
    height: 40px;
}

.product-card {
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    padding: 20px;
    width: 300px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
}

.product-card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    filter: grayscale(100%);
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.product-card img.active {
    opacity: 1;
}

.product-card h2 {
    margin: 15px 0 10px 0;
    color: #111;
    position: relative;
    z-index: 1;
}

.text-button {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background-color: #000;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    position: relative;
    z-index: 1;
}

.text-button:hover {
    background-color: #333;
}
</style>
</head>
<body>

<script>
const cards = document.querySelectorAll('.product-card');
cards.forEach(card => {
    const images = card.querySelectorAll('img');
    let current = 0;
    setInterval(() => {
        images[current].classList.remove('active');
        current = (current + 1) % images.length;
        images[current].classList.add('active');
    }, 2000); // rotate every 2 seconds
});
</script>
