<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365Resellz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header {
    width: 100%;
    padding: 30px 0;
    background: #111;
    color: white;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 50px;
    letter-spacing: 2px;
    position: relative;
}

header img {
    width: 35px;
    height: 35px;
    vertical-align: middle;
    margin: 0 10px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    width: 90%;
    margin: 40px 0;
}

.card {
    background: #fff;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
    text-align: center;
    padding-bottom: 20px;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.3);
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    filter: grayscale(100%);
    transition: filter 0.5s;
}

.card img:hover {
    filter: grayscale(0%);
}

.card h2 {
    margin: 15px 0 10px;
    font-size: 24px;
    color: #111;
}

.button {
    display: inline-block;
    padding: 10px 20px;
    background: #111;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: background 0.3s;
}

.button:hover {
    background: #333;
}

footer {
    margin-top: 50px;
    padding: 20px;
    font-size: 14px;
    color: #555;
    text-align: center;
}
</style>
</head>
<body>
