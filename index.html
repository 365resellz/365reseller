<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365 Resell</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    scroll-behavior: smooth;
  }

  header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 20px 40px;
    background: #000;
  }

  header h1 {
    font-family: 'Comic Neue', cursive;
    font-size: 2.2em;
    color: #fff;
    margin: 0;
  }

  nav {
    margin: 20px 0;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #aaa;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 25px;
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .product {
    background: #000;
    border: 2px solid #fff;
    border-radius: 15px;
    padding: 40px 10px;
    font-size: 1.3em;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }

  .product:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 20px rgba(255,255,255,0.3);
  }

  .product button {
    margin-top: 15px;
    padding: 12px 20px;
    background: #000;
    color: #fff;
    border: 2px solid #fff;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
    transition: all 0.3s;
  }

  .product button:hover {
    background: #fff;
    color: #000;
  }

  .payment {
    max-width: 500px;
    margin: 50px auto;
    padding: 40px 20px;
    border: 2px solid #fff;
    border-radius: 15px;
    text-align: center;
    transition: transform 0.3s;
  }

  .payment h2 {
    margin-bottom: 20px;
  }

  .payment p {
    font-size: 1.2em;
    margin: 10px 0;
  }

  footer {
    margin-top: 50px;
    padding: 20px;
    border-top: 2px solid #fff;
    color: #fff;
  }

  @media (max-width: 600px) {
    header h1 {
      font-size: 1.8em;
    }
  }
</style>
</head>
<body>

<header>
  <h1>365Resellz</h1>
</header>

<nav>
  <a href="#products">Products</a>
  <a href="#payment">Payment</a>
</nav>

<section id="products" class="products">
  <div class="product">
    Watch
    <button onclick="scrollToPayment()">Buy Now</button>
  </div>
  <div class="product">
    Hoodie
    <button onclick="scrollToPayment()">Buy Now</button>
  </div>
  <div class="product">
    Shorts
    <button onclick="scrollToPayment()">Buy Now</button>
  </div>
  <div class="product">
    Designer T-Shirt
    <button onclick="scrollToPayment()">Buy Now</button>
  </div>
  <div class="product">
    Clothing Item
    <button onclick="scrollToPayment()">Buy Now</button>
  </div>
  <div class="product">
    Electronics
    <button onclick="scrollToPayment()">Buy Now</button>
  </div>
</section>

<section id="payment" class="payment">
  <h2>Payment Info</h2>
  <p>Pay via e-Transfer to my number:</p>
  <p><strong>365 886 1132</strong></p>
  <p>Include the item name in your payment note.</p>
</section>

<footer>
  &copy; 2026 365 Resell. All rights reserved.
</footer>

<script>
function scrollToPayment() {
  const payment = document.getElementById('payment');
  payment.scrollIntoView({behavior: 'smooth'});
  alert("Send your e-transfer to 365 886 1132!");
}
</script>

</body>
</html>
