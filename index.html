<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365 Resell</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(180deg, #000000, #111111);
    color: #fff;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    background: #111;
  }

  header img {
    width: 100px;
    margin-right: 20px;
  }

  header h1 {
    font-size: 2.5em;
    letter-spacing: 2px;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #ffcc00;
  }

  .hero {
    background: url('https://images.unsplash.com/photo-1600180758890-6b94519a8ba8') center/cover no-repeat;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3em;
    font-weight: bold;
    text-shadow: 2px 2px 8px #000;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    padding: 50px 20px;
    max-width: 1200px;
    margin: auto;
  }

  .product {
    background: #111;
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .product:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
  }

  .product img {
    width: 100%;
    display: block;
  }

  .product-content {
    padding: 20px;
  }

  .product-content h2 {
    margin: 0 0 10px 0;
    font-size: 1.3em;
  }

  .product-content button {
    background: #ffcc00;
    color: #000;
    border: none;
    padding: 12px 20px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s;
  }

  .product-content button:hover {
    background: #e6b800;
  }

  .payment {
    background: #111;
    padding: 40px 20px;
    max-width: 600px;
    margin: 50px auto;
    border: 2px solid #ffcc00;
    border-radius: 15px;
    text-align: center;
  }

  .payment h2 {
    margin-bottom: 20px;
    color: #ffcc00;
  }

  .payment p {
    font-size: 1.2em;
    margin: 10px 0;
  }

  footer {
    background: #111;
    padding: 30px 20px;
    text-align: center;
    color: #aaa;
    font-size: 0.9em;
  }

  @media (max-width: 600px) {
    header h1 {
      font-size: 1.8em;
    }
    .hero {
      font-size: 2em;
      height: 250px;
    }
  }
</style>
</head>
<body>

<header>
  <img src="https://via.placeholder.com/100x100.png?text=365" alt="365 Logo">
  <h1>365 Resell</h1>
</header>

<nav>
  <a href="#products">Products</a>
  <a href="#payment">Payment</a>
</nav>

<div class="hero">
  Luxury Resell. Every Day.
</div>

<section id="products" class="products">
  <div class="product">
    <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba8" alt="Sneakers">
    <div class="product-content">
      <h2>Luxury Sneakers</h2>
      <button>Buy Now</button>
    </div>
  </div>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="Hoodie">
    <div class="product-content">
      <h2>Designer Hoodie</h2>
      <button>Buy Now</button>
    </div>
  </div>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Watch">
    <div class="product-content">
      <h2>Luxury Watch</h2>
      <button>Buy Now</button>
    </div>
  </div>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1593032465173-2c3b85a9f78a" alt="AirPods Max">
    <div class="product-content">
      <h2>AirPods Max</h2>
      <button>Buy Now</button>
    </div>
  </div>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f" alt="Bracelet">
    <div class="product-content">
      <h2>Designer Bracelet</h2>
      <button>Buy Now</button>
    </div>
  </div>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1606813904085-f3b9a4d43b4a" alt="Sunglasses">
    <div class="product-content">
      <h2>Luxury Glasses</h2>
      <button>Buy Now</button>
    </div>
  </div>
</section>

<section id="payment" class="payment">
  <h2>Payment Info</h2>
  <p>Pay via e-Transfer to my number:</p>
  <p><strong>365 886 1132</strong></p>
  <p>Include the item name in your payment note.</p>
</section>

<footer>
  &copy; 2026 365 Resell. All rights reserved.
