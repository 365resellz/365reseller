<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>365 Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: black;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<header>
  365 STORE
</header>

<div class="container">

  <!-- BALENCIAGA PRODUCT -->
  <div class="product">
    <img src="https://i.ibb.co/2YyxbvHc/IMG-7622.jpg" alt="Balenciaga Sneaker">
    <h3>Balenciaga Track Sneaker</h3>
    <p>$220</p>
    <a href="tel:3658861132">
      <button>Buy Now</button>
    </a>
  </div>

</div>

</body>
</html>
