<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365resellz</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #021a1a;
  color: white;
}

/* flag */
.flag {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
}

/* banner */
.banner {
  text-align: center;
  background: black;
  padding: 12px;
  font-weight: bold;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

/* logo */
.logo {
  font-size: 26px;
  font-weight: bold;
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 50px;
}

/* products */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

/* card */
.card {
  background: #033;
  border-radius: 12px;
  padding: 20px;
  position: relative;
  text-align: center;
}

.sale {
  position: absolute;
  top: 10px;
  left: 10px;
  background: black;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.card h3 {
  margin-top: 20px;
}

/* price */
.price {
  font-weight: bold;
  margin: 10px 0;
}

/* button */
button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: red;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
}

/* cart */
.cart {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #011;
  padding: 20px;
  transition: 0.4s;
}

.cart.active {
  bottom: 0;
}
</style>
</head>

<body>

<div class="flag">🇨🇦</div>

<div class="banner">
⭐ Get $10 Off All Products Using Code 365 ⭐
</div>

<div class="header">
  <div>☰</div>
  <div class="logo">365resellz</div>
  <div>🛒</div>
</div>

<div class="products">

  <div class="card">
    <span class="sale">Sale</span>
    <h3>Accessories Suppliers Bundle</h3>
    <p class="price">$10.99 CAD</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card">
    <span class="sale">Sale</span>
    <h3>Clothing Suppliers Bundle</h3>
    <p class="price">$10.99 CAD</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card">
    <span class="sale">Sale</span>
    <h3>Cologne Suppliers Bundle</h3>
    <p class="price">$10.99 CAD</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card">
    <span class="sale">Sale</span>
    <h3>Electronics Suppliers Bundle</h3>
    <p class="price">$10.99 CAD</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <p>$10.99 CAD</p>
  <button onclick="checkout()">Checkout with PayPal</button>
</div>

<script>
function addToCart() {
  document.getElementById("cart").classList.add("active");
}

function checkout() {
  window.location.href = "PASTE_YOUR_PAYPAL_LINK_HERE";
}
</script>

</body>
</html>
