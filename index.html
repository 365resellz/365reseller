<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365 Resell</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    scroll-behavior: smooth;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #000;
  }

  header h1 {
    font-family: 'Comic Neue', cursive;
    font-size: 2em;
    margin: 0;
    color: #fff;
  }

  nav {
    margin: 20px 0;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #aaa;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .product {
    background: #000;
    border: 1px solid #fff;
    border-radius: 10px;
    padding: 30px 10px;
    font-size: 1.2em;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .product:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(255,255,255,0.2);
  }

  .product button {
    margin-top: 15px;
    padding: 10px 15px;
    background: #000;
    color: #fff;
    border: 1px solid #fff;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
  }

  .product button:hover {
    background: #fff;
    color: #000;
  }

  .payment {
    max-width: 500px;
    margin: 50px auto;
    padding: 30px 20px;
    border: 1px solid #fff;
    border-radius: 10px;
    text-align: center;
  }

  .payment h2 {
    margin-bottom: 15px;
  }

  .payment p {
    font-size: 1.1em;
    margin: 8px 0;
  }

  footer {
    margin-top: 50px;
    padding: 20px;
    border-top: 1px solid #fff;
    color: #fff;
  }

  @media (max-width: 600px) {
    header h1 {
      font-size: 1.5em;
    }
  }
</style>
</head>
<body>

<header>
  <h1>365Resellz</h1>
</header>

<nav>
  <a href="#products">Products</a>
  <a href="#payment">Payment</a>
</nav>

<section id="products" class="products">
  <div class="product">
    Watch
    <button onclick="document.getElementById('payment').scrollIntoView({behavior:'smooth'});">Buy Now</button>
  </div>
  <div class="product">
    Hoodie
    <button onclick="document.getElementById('payment').scrollIntoView({behavior:'smooth'});">Buy Now</button>
  </div>
  <div class="product">
    Shorts
    <button onclick="document.getElementById('payment').scrollIntoView({behavior:'smooth'});">Buy Now</button>
  </div>
  <div class="product">
    Designer T-Shirt
    <button onclick="document.getElementById('payment').scrollIntoView({behavior:'smooth'});">Buy Now</button>
  </div>
  <div class="product">
    Clothing Item
    <button onclick="document.getElementById('payment').scrollIntoView({behavior:'smooth'});">Buy Now</button>
  </div>
  <div class="product">
    Electronics
    <button onclick="document.getElementById('payment').scrollIntoView({behavior:'smooth'});">Buy Now</button>
  </div>
</section>

<section id="payment" class="payment">
  <h2>Payment Info</h2>
  <p>Pay via e-Transfer to my number:</p>
  <p><strong>365 886 1132</strong></p>
  <p>Include the item name in your payment note.</p>
</section>

<footer>
  &copy; 2026 365 Resell. All rights reserved.
</footer>

</body>
</html>
