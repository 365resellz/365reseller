<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Products</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        padding: 20px;
    }
    .product-card {
        background-color: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        padding: 20px;
        width: 300px;
        text-align: center;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
    }
    .product-card img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        filter: grayscale(100%);
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }
    .product-card img.active {
        opacity: 1;
    }
    .product-card h2 {
        margin: 15px 0 10px 0;
        color: #111;
        position: relative;
        z-index: 1;
    }
    .text-button {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 20px;
        background-color: #000;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        position: relative;
        z-index: 1;
    }
    .text-button:hover {
        background-color: #333;
    }
</style>
</head>
<body>

<!-- Sneakers -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=Sneakers+1" class="active" alt="Sneakers 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=Sneakers+2" alt="Sneakers 2">
    <h2>Sneakers</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<!-- Cologne -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=Cologne+1" class="active" alt="Cologne 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=Cologne+2" alt="Cologne 2">
    <h2>Cologne</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<!-- T-Shirts -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=T-Shirt+1" class="active" alt="T-Shirt 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=T-Shirt+2" alt="T-Shirt 2">
    <h2>T-Shirts</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<!-- Hoodies -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=Hoodie+1" class="active" alt="Hoodie 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=Hoodie+2" alt="Hoodie 2">
    <h2>Hoodies</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<!-- Watches -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=Watch+1" class="active" alt="Watch 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=Watch+2" alt="Watch 2">
    <h2>Watches</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<!-- Jeans/Pants -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=Jeans+1" class="active" alt="Jeans 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=Jeans+2" alt="Jeans 2">
    <h2>Jeans/Pants</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<!-- Hats -->
<div class="product-card">
    <img src="https://via.placeholder.com/300x300/000000/FFFFFF?text=Hat+1" class="active" alt="Hat 1">
    <img src="https://via.placeholder.com/300x300/111111/FFFFFF?text=Hat+2" alt="Hat 2">
    <h2>Hats</h2>
    <a href="sms:+1234567890" class="text-button">Text Me</a>
</div>

<script>
    const cards = document.querySelectorAll('.product-card');
    cards.forEach(card => {
        const images = card.querySelectorAll('img');
        let current = 0;
        setInterval(() => {
            images[current].classList.remove('active');
            current = (current + 1) % images.length;
            images[current].classList.add('active');
        }, 3000);
    });
</script>

</body>
</html>
