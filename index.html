<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365Resellz</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
  }
  header {
    background-color: #000;
    color: #fff;
    padding: 20px;
    text-align: center;
    font-size: 3em;
    font-family: 'Comic Sans MS', cursive, sans-serif;
  }
  h2 {
    margin-top: 40px;
    text-align: center;
    font-size: 2em;
    text-transform: uppercase;
  }
  .inspo-note {
    text-align: center;
    margin: 10px 0;
    font-size: 1em;
    color: #ccc;
  }
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }
  .product {
    background-color: #111;
    border: 1px solid #fff;
    padding: 10px;
    width: 200px;
    text-align: center;
  }
  .product img {
    width: 100%;
    height: auto;
  }
  .product-name {
    margin: 10px 0;
    font-size: 1em;
    text-transform: capitalize;
  }
  .buy-button {
    background-color: #000;
    color: #fff;
    border: 1px solid #fff;
    padding: 10px;
    cursor: pointer;
    font-size: 1em;
    transition: all 0.3s;
  }
  .buy-button:hover {
    background-color: #fff;
    color: #000;
  }
</style>
</head>
<body>

<header>365Resellz</header>

<div class="inspo-note">
  These photos are inspiration picks. For more options or details, text 365-886-1132.
</div>

<section>
  <h2>Products</h2>
  <div class="products" id="product-container">
    <!-- Products will load here -->
  </div>
</section>

<script>
  const productContainer = document.getElementById('product-container');

  // List all image filenames (just drop them in /images folder)
  const images = [
    'hellstar-hoodie.jpg',
    'gallerydept-hoodie.jpg',
    'gallerydept-tshirt.jpg',
    'bape-hoodie.jpg',
    'rolex-watch.jpg',
    'cartier-glasses.jpg',
    'airpods.jpg',
    'airpods-max.jpg',
    'ysl-cologne.jpg',
    'valentino-cologne.jpg'
  ];

  images.forEach(img => {
    const productDiv = document.createElement('div');
    productDiv.classList.add('product');

    const imageEl = document.createElement('img');
    imageEl.src = `images/${img}`;
    imageEl.alt = img.replace(/-/g,' ').replace('.jpg','');

    const nameEl = document.createElement('div');
    nameEl.classList.add('product-name');
    nameEl.textContent = img.replace(/-/g,' ').replace('.jpg','');

    const buttonEl = document.createElement('button');
    buttonEl.classList.add('buy-button');
    buttonEl.textContent = 'Buy Now';
    buttonEl.onclick = () => alert('Send e-transfer to 365-886-1132');

    productDiv.appendChild(imageEl);
    productDiv.appendChild(nameEl);
    productDiv.appendChild(buttonEl);

    productContainer.appendChild(productDiv);
  });
</script>

</body>
</html>
