<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>365 Resell</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    header {
      background: #111;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    header img {
      width: 80px;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .product {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      transition: transform 0.2s;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product h2 {
      font-size: 1.2em;
      margin: 10px 0;
    }

    .product button {
      padding: 10px 20px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .product button:hover {
      background: #ddd;
    }

    .payment {
      background: #111;
      padding: 30px;
      margin: 40px auto;
      border-radius: 15px;
      max-width: 500px;
      text-align: center;
      border: 2px solid #fff;
    }

    .payment h2 {
      margin-bottom: 20px;
    }

    .payment p {
      font-size: 1.2em;
      margin: 10px 0;
    }

    footer {
      background: #111;
      padding: 20px;
      margin-top: 50px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <img src="https://via.placeholder.com/80x80.png?text=365" alt="365 Logo">
  <h1>365 Resell</h1>
</header>

<div class="products">
  <div class="product">
    <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba8" alt="Sneakers">
    <h2>Luxury Sneakers</h2>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="Hoodie">
    <h2>Designer Hoodie</h2>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Watch">
    <h2>Luxury Watch</h2>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1593032465173-2c3b85a9f78a" alt="AirPods">
    <h2>AirPods Max</h2>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f" alt="Bracelet">
    <h2>Designer Bracelet</h2>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1606813904085-f3b9a4d43b4a" alt="Sunglasses">
    <h2>Luxury Glasses</h2>
    <button>Buy Now</button>
  </div>
</div>

<div class="payment">
  <h2>Payment</h2>
  <p>Pay via e-Transfer to my number:</p>
  <p><strong>365 886 1132</strong></p>
  <p>Please include the item name in your payment note.</p>
</div>

<footer>
  &copy; 2026 365 Resell. All rights reserved.
</footer>

</body>
</html>
