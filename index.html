<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>365 Resell</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    background: #000;
  }

  header img {
    width: 100px;
    margin-right: 20px;
  }

  header h1 {
    font-size: 2.5em;
    letter-spacing: 2px;
    color: #fff;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
  }

  nav a:hover {
    color: #aaa;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    padding: 50px 20px;
    max-width: 1200px;
    margin: auto;
  }

  .product {
    background: #000;
    border: 1px solid #fff;
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .product:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
  }

  .product img {
    width: 100%;
    display: block;
  }

  .product-content {
    padding: 20px;
  }

  .product-content h2 {
    margin: 0 0 10px 0;
    font-size: 1.3em;
    color: #fff;
  }

  .product-content button {
    background: #000;
    color: #fff;
    border: 1px solid #fff;
    padding: 12px 20px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s, color 0.3s;
  }

  .product-content button:hover {
    background: #fff;
    color: #000;
  }

  .payment {
    background: #000;
    padding: 40px 20px;
    max-width: 600px;
    margin: 50px auto;
    border: 1px solid #fff;
    border-radius: 15px;
    text-align: center;
  }

  .payment h2 {
    margin-bottom: 20px;
    color: #fff;
  }

  .payment p {
    font-size: 1.2em;
    margin: 10px 0;
    color: #fff;
  }

  footer {
    background: #000;
    padding: 30px 20px;
    text-align: center;
    color: #fff;
    font-size: 0.9em;
    border-top: 1px solid #fff;
  }

  @media (max-width: 600px) {
    header h1 {
      font-size: 1.8em;
    }
  }
</style>
</head>
<body>

<header>
  <img src="https://via.placeholder.com/100x100.png?text=365" alt="365 Logo">
  <h1>365 Resell</h1>
</header>

<nav>
  <a href="#products">Products</a>
  <a href="#payment">Payment</a>
</nav>

<section id="products" class="products">
  <div class="product">
    <img src="https://via.placeholder.com/250x250.png?text=Watch" alt="Watch">
    <div class="product-content">
      <h2>Luxury Watch</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250x250.png?text=Hoodie" alt="Hoodie">
    <div class="product-content">
      <h2>Designer Hoodie</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250x250.png?text=Shorts" alt="Shorts">
    <div class="product-content">
      <h2>Stylish Shorts</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250x250.png?text=AirPods" alt="AirPods">
    <div class="product-content">
      <h2>AirPods / AirPods Max</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250x250.png?text=Bracelet" alt="Bracelet">
    <div class="product-content">
      <h2>Designer Bracelet</h2>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250x250.png?text=Glasses" alt="Glasses">
    <div class="product-content">
      <h2>Luxury Glasses</h2>
      <button>Buy Now</button>
    </div>
  </div>
</section>

<section id="payment" class="payment">
  <h2>Payment Info</h2>
  <p>Pay via e-Transfer to my number:</p>
  <p><strong>365 886 1132</strong></p>
  <p>Include the item name in your payment note.</p>
</section>

<footer>
  &copy; 2026 365 Resell. All rights reserved.
</footer>

</body>
</html>
